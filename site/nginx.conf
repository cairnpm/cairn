server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_min_length 1024;
  gzip_types text/css text/plain application/javascript application/json application/xml image/svg+xml;

  # Nuxt fingerprints everything under /_nuxt, so it can be cached forever. The HTML must NOT be, or a
  # redeploy would keep serving the previous page from browser caches.
  location /_nuxt/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Prerendered routes are files: /foo → /foo.html.
  location / {
    try_files $uri $uri.html $uri/ =404;
  }

  error_page 404 /404.html;
}
